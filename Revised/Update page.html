<!doctype html>
<html>
<head>
    <title>Criminal Records Management</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Lato:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --dark-blue: #1a202c;
            --medium-blue: #2d3748;
            --light-blue-gray: #edf2f7;
            --white: #ffffff;
            --accent-green: #38a169;
            --accent-green-dark: #2f855a;
            --text-color: #e2e8f0;
            --border-color: #4a5568;
            --shadow-color: rgba(0, 0, 0, 0.4);
            --card-shadow: 0 10px 25px var(--shadow-color);
            --input-bg: #4a5568;
            --input-text: #e2e8f0;
            --button-hover-transform: translateY(-2px);
        }

        body {
            font-family: 'Lato', sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, var(--dark-blue) 0%, var(--medium-blue) 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: var(--text-color);
            line-height: 1.6;
            box-sizing: border-box;
            background-image: url('https://img.freepik.com/premium-photo/wooden-hammer-judge-brown-background_188237-294.jpg?w=2000');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
        }

        /* Overlay to make background less distracting and text more readable */
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(26, 32, 44, 0.75); /* Dark overlay */
            z-index: -1;
        }

        .container {
            background-color: rgba(30, 41, 59, 0.95); /* Slightly lighter than body, semi-transparent */
            border-radius: 12px;
            padding: 40px;
            margin: 25px;
            box-shadow: var(--card-shadow);
            max-width: 700px;
            width: 90%;
            border: 1px solid var(--border-color);
            animation: fadeInScale 0.8s ease-out forwards;
            position: relative; /* For inner elements */
            overflow: hidden; /* To contain shadows */
        }

        @keyframes fadeInScale {
            from { opacity: 0; transform: scale(0.95) translateY(20px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .container::before {
            content: '';
            position: absolute;
            top: -50px;
            left: -50px;
            width: 150px;
            height: 150px;
            background: radial-gradient(circle, rgba(56, 161, 105, 0.2) 0%, transparent 70%);
            border-radius: 50%;
            filter: blur(40px);
            opacity: 0.7;
            pointer-events: none;
            animation: subtleGlow 4s infinite alternate ease-in-out;
        }

        @keyframes subtleGlow {
            from { transform: translate(0, 0); opacity: 0.7; }
            to { transform: translate(20px, 20px); opacity: 0.9; }
        }

        h1 {
            font-family: 'Montserrat', sans-serif;
            font-size: 3em;
            color: var(--accent-green);
            text-align: center;
            margin-bottom: 35px;
            text-shadow: 2px 2px 5px var(--shadow-color);
            letter-spacing: 1.5px;
            position: relative;
            animation: slideInTop 0.6s ease-out forwards;
        }

        @keyframes slideInTop {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
        }

        .form-group {
            position: relative;
            animation: slideInLeft 0.7s ease-out forwards;
            opacity: 0; /* Hidden by default for animation */
            transform: translateX(-20px);
        }
        .form-group:nth-child(2) { animation-delay: 0.1s; }
        .form-group:nth-child(3) { animation-delay: 0.2s; }
        .form-group:nth-child(4) { animation-delay: 0.3s; }
        .form-group:nth-child(5) { animation-delay: 0.4s; }
        .form-group:nth-child(6) { animation-delay: 0.5s; }
        .form-group:nth-child(7) { animation-delay: 0.6s; }
        .form-group:nth-child(8) { animation-delay: 0.7s; }
        .form-group:nth-child(9) { animation-delay: 0.8s; }


        @keyframes slideInLeft {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }


        label {
            color: var(--text-color);
            font-weight: 600;
            display: block;
            margin-bottom: 8px;
            font-size: 0.95em;
        }

        input[type="number"],
        input[type="date"],
        input[type="text"],
        select {
            width: 100%;
            padding: 14px 15px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background-color: var(--input-bg);
            color: var(--input-text);
            box-sizing: border-box;
            font-size: 1em;
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
            outline: none;
            box-shadow: inset 0 2px 5px rgba(0, 0, 0, 0.2); /* Inner shadow for depth */
        }

        input[type="number"]::placeholder,
        input[type="text"]::placeholder {
            color: rgba(226, 232, 240, 0.6);
        }

        input[type="number"]:focus,
        input[type="date"]:focus,
        input[type="text"]:focus,
        select:focus {
            border-color: var(--accent-green);
            box-shadow: 0 0 0 3px rgba(56, 161, 105, 0.3), inset 0 2px 5px rgba(0, 0, 0, 0.3); /* Focus glow */
        }

        select {
            appearance: none;
            background-image: url('data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20viewBox%3D%220%200%204%205%22%3E%3Cpath%20fill%3D%22%23e2e8f0%22%20d%3D%22M2%200L0%202h4zm0%205L0%203h4z%22%2F%3E%3C%2Fsvg%3E');
            background-repeat: no-repeat;
            background-position: right 15px center;
            background-size: 10px;
            padding-right: 40px;
        }

        button {
            grid-column: 1 / -1; /* Make button span all columns in the grid */
            background-color: var(--accent-green);
            color: var(--white);
            padding: 16px 35px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1.15em;
            font-weight: 700;
            letter-spacing: 0.8px;
            transition: background-color 0.3s ease, transform 0.2s ease, box-shadow 0.3s ease;
            box-shadow: 0 6px 15px rgba(56, 161, 105, 0.4); /* Glow shadow for button */
            margin-top: 30px;
            outline: none;
            position: relative;
            overflow: hidden;
            z-index: 1;
        }

        button::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 300%;
            height: 300%;
            background-color: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            transition: width 0.4s ease-out, height 0.4s ease-out, top 0.4s ease-out, left 0.4s ease-out;
            transform: translate(-50%, -50%);
            z-index: -1;
        }

        button:hover::before {
            width: 0%;
            height: 0%;
            top: 50%;
            left: 50%;
        }

        button:hover {
            background-color: var(--accent-green-dark);
            transform: var(--button-hover-transform);
            box-shadow: 0 8px 20px rgba(56, 161, 105, 0.5);
        }

        button:active {
            transform: translateY(0);
            box-shadow: 0 3px 8px rgba(56, 161, 105, 0.3);
            background-color: var(--accent-green-dark);
        }

        /* Responsive adjustments */
        @media (max-width: 768px) {
            h1 {
                font-size: 2.5em;
                margin-bottom: 25px;
            }
            .container {
                padding: 30px;
            }
            .form-grid {
                grid-template-columns: 1fr; /* Stack columns on smaller screens */
            }
            input[type="number"],
            input[type="date"],
            input[type="text"],
            select,
            button {
                padding: 12px;
            }
        }

        @media (max-width: 480px) {
            h1 {
                font-size: 2em;
            }
            .container {
                margin: 15px;
                padding: 20px;
            }
            label {
                font-size: 0.9em;
            }
            button {
                font-size: 1em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1><b>CRIMINAL RECORDS UPDATE</b></h1>
        <div class="form-grid">
            <div class="form-group">
                <label for="case_id">CASE ID:</label>
                <input type="number" id="case_id" placeholder="Enter Case ID">
            </div>
            <div class="form-group">
                <label for="leave_date">LEAVING DATE:</label>
                <input type="date" id="leave_date">
            </div>
            <div class="form-group">
                <label for="punishment_type">PUNISHMENT TYPE:</label>
                <input type="text" id="punishment_type" placeholder="Type of punishment">
            </div>
            <div class="form-group">
                <label for="punishment_name">PUNISHMENT NAME:</label>
                <input type="text" id="punishment_name" placeholder="Name of punishment">
            </div>
            <div class="form-group">
                <label for="station_incharge">STATION INCHARGE:</label>
                <input type="text" id="station_incharge" placeholder="Name of the Station Incharge">
            </div>
            <div class="form-group">
                <label for="court_type">COURT TYPE:</label>
                <select id="court_type">
                    <option value="">Select</option>
                    <option value="Supreme Court">Supreme Court</option>
                    <option value="High Court">High Court</option>
                    <option value="District Court">District Court</option>
                    <option value="Zonal Court">Zonal Court</option>
                    <option value="Lok Adalat">Lok Adalat</option>
                </select>
            </div>
            <div class="form-group">
                <label for="court_no">COURT NO:</label>
                <input type="text" id="court_no" placeholder="Enter the court ID">
            </div>
            <div class="form-group">
                <label for="prison_name">PRISON NAME:</label>
                <input type="text" id="prison_name" placeholder="Enter the Prison name">
            </div>
            <div class="form-group">
                <label for="prison_no">PRISON NO:</label>
                <input type="number" id="prison_no" placeholder="Enter the Prison ID">
            </div>
            <button type="submit">SUBMIT</button>
        </div>
    </div>
</body>
</html>
